# examples/cronduit.toml -- Cronduit quickstart configuration.
#
# This file ships two example jobs that demonstrate both execution types:
#   1. A command job that runs every minute (instant feedback)
#   2. A Docker container job that runs every 5 minutes
#
# SECURITY:
#   * Never commit plaintext secrets. Use env-var references (${VAR}) and set
#     the variables at runtime (docker-compose `environment:` block, or
#     a .env file mounted into the container).
#   * Mount this file read-only (`:ro`) in docker-compose.
#   * Default bind is loopback. Change ONLY if you put Cronduit behind
#     a reverse proxy with auth.

[server]
bind = "0.0.0.0:8080"
timezone = "UTC"
log_retention = "90d"
shutdown_grace = "30s"
# database_url is omitted -- the Rust default reads DATABASE_URL from the
# environment (honored by examples/docker-compose.yml) and falls back to
# `sqlite://./cronduit.db?mode=rwc` for local dev. Override explicitly here
# if you want a different database without touching the environment.

[defaults]
image = "alpine:latest"
network = "bridge"
delete = true
timeout = "5m"
random_min_gap = "0s"

# ------------------------------------------------------------
# Quickstart jobs
# ------------------------------------------------------------

# A local command job. Runs every minute for instant feedback.
[[jobs]]
name = "echo-timestamp"
schedule = "*/1 * * * *"
command = "date '+%Y-%m-%d %H:%M:%S -- Cronduit is running!'"

# An ephemeral Docker container job. Runs every 5 minutes.
# Uses Docker's canonical hello-world image, which prints a greeting from its
# built-in ENTRYPOINT (no command override needed -- JobConfig requires exactly
# one of `command`, `script`, or `image`). `delete = true` removes the
# container after completion.
[[jobs]]
name = "hello-world"
schedule = "*/5 * * * *"
image = "hello-world:latest"
delete = true
