# Cronduit quickstart -- run `docker compose up` to get started.
#
# ============================================================================
# SECURITY: READ BEFORE DEPLOYING
# ============================================================================
# This example binds `ports: - "8080:8080"` so an operator following the
# README quickstart can reach the web UI at http://localhost:8080 without
# additional configuration. That convenience has a cost:
#
#   * The v1 web UI ships UNAUTHENTICATED. Anyone who can reach port 8080
#     on the host can view every job, trigger Run Now, and reload the
#     config. Default Cronduit (outside this example) binds 127.0.0.1:8080
#     and logs a loud WARN if you change it to a non-loopback address.
#   * With `ports:`, Docker publishes 8080 on ALL host interfaces by
#     default. If this host is reachable from the public internet, the
#     web UI is reachable from the public internet.
#   * The Cronduit container mounts the host Docker socket
#     (`/var/run/docker.sock`). Code execution inside Cronduit is
#     effectively root-equivalent on the host. See `THREAT_MODEL.md` at
#     the repo root for the full threat model (Docker Socket, Untrusted
#     Client, Config Tamper, Malicious Image).
#
# For ANY deployment beyond "I am the only person on this loopback
# interface," replace the `ports:` stanza below with `expose:` and put
# Cronduit behind a reverse proxy with authentication (Traefik, Caddy,
# nginx basic auth, etc.). The `expose:` replacement looks like this:
#
#     # ports:
#     #   - "8080:8080"
#     expose:
#       - "8080"
#
# With `expose:`, the container still listens on 8080 but the port is
# NOT published on the host -- only other containers on the same Docker
# network (e.g., your reverse proxy) can reach it.
#
# docker.sock access: by default, cronduit runs as UID 1000 inside the alpine
# runtime image. To let the non-root cronduit user read /var/run/docker.sock,
# this file uses a `group_add` stanza that joins the cronduit process to the
# host docker group. The `DOCKER_GID` environment variable overrides the
# default (999). Derive the correct value for your host:
#
#   Linux:
#     export DOCKER_GID=$(stat -c %g /var/run/docker.sock)
#
#   macOS + Rancher Desktop:
#     export DOCKER_GID=102   # the VM-side docker group GID inside lima
#
# You can also set it via a `.env` file next to this compose file:
#
#     # .env
#     DOCKER_GID=998
#
# macOS + Docker Desktop: the socket GID inside the Docker Desktop VM is not
# stable across releases, so `group_add` alignment is brittle there. Use
# `examples/docker-compose.secure.yml` instead — it runs a docker-socket-proxy
# sidecar (as root) that mediates Docker API access through a narrow allowlist
# and does not rely on host GID alignment.
#
# Verifying the mount: after `docker compose up -d`, run
# `curl -sS http://localhost:8080/metrics | grep cronduit_docker_reachable`.
# A value of `1` means bollard pinged the daemon successfully; `0` means the
# startup preflight failed (wrong DOCKER_GID, missing mount, daemon down).
# See README Troubleshooting for the full diagnostic flow.
#
# Prerequisites: Docker with Compose v2+
# Usage: docker compose -f examples/docker-compose.yml up -d
# Web UI: http://localhost:8080

services:
  cronduit:
    image: ghcr.io/simplicityguy/cronduit:latest
    # Join the host docker group so UID 1000 inside the container can
    # read /var/run/docker.sock. Override DOCKER_GID via .env or shell
    # env to match `stat -c %g /var/run/docker.sock` on your host.
    # See the SECURITY block above for details.
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "8080:8080"
    volumes:
      # CRONDUIT_DOCKER_SOCKET lets Rancher Desktop / non-standard hosts point
      # at the real socket path (e.g. $HOME/.rd/docker.sock). NOTE: on macOS
      # the docker socket is typically mode 0600 user-owned, so group_add
      # alone CANNOT grant UID 1000 access even with a valid path. macOS
      # users should use docker-compose.secure.yml instead.
      - ${CRONDUIT_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - ./cronduit.toml:/etc/cronduit/config.toml:ro
      - cronduit-data:/data
    environment:
      - RUST_LOG=info,cronduit=debug
      - DATABASE_URL=sqlite:///data/cronduit.db
    restart: unless-stopped

volumes:
  cronduit-data:
