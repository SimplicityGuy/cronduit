<div id="log-container">
  <h2 style="font-size:var(--cd-text-lg);font-weight:700;margin-bottom:var(--cd-space-4)">Log Output</h2>

  {% if total_logs == 0 %}
  <div style="padding:var(--cd-space-6);text-align:center;color:var(--cd-text-secondary);font-size:var(--cd-text-base)">
    No log output captured for this run.
  </div>
  {% else %}
  <div id="log-lines" style="background:var(--cd-bg-surface-sunken);padding:var(--cd-space-4);border-radius:8px;overflow-x:auto">
    {% include "partials/log_viewer.html" %}
  </div>
  {% endif %}
</div>
