{% if has_older %}
<div class="mb-2">
  <button class="cd-btn-secondary text-sm py-1 px-3"
          hx-get="/partials/log-viewer/{{ run_id }}?offset={{ next_offset }}"
          hx-target="#log-lines"
          hx-swap="afterbegin">
    Load older lines
  </button>
</div>
{% endif %}
{% for log in logs %}
<div class="{% if log.is_stderr %}border-l-4 border-(--cd-status-error) bg-(--cd-status-error-bg){% endif %} py-[2px] px-(--cd-space-2)" style="font-size:var(--cd-text-base);line-height:1.6">
  <span class="text-(--cd-text-secondary) select-none" style="font-size:var(--cd-text-xs)">{{ log.stream }}</span>
  {{ log.html|safe }}
</div>
{% endfor %}
