<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cronduit{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" sizes="32x32" href="/static/favicons/favicon-32.svg">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/static/favicons/favicon-16.svg">
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/static/favicons/favicon-192.svg">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/theme.js"></script>
</head>
<body class="bg-[var(--cd-bg-primary)] text-[var(--cd-text-primary)] font-mono min-h-screen">
  <!-- Navigation -->
  <nav class="bg-[var(--cd-bg-surface)] border-b border-[var(--cd-border-subtle)] px-4 py-3">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-6">
        <!-- Brand -->
        <a href="/" class="text-[var(--cd-text-accent)] font-bold text-lg no-underline tracking-wide">
          cronduit
        </a>
        <!-- Nav links -->
        <div class="flex items-center gap-4">
          <a href="/"
             class="text-[var(--cd-text-secondary)] hover:text-[var(--cd-text-primary)] no-underline text-sm py-1 {% block nav_dashboard_active %}{% endblock %}">
            Dashboard
          </a>
          <a href="/settings"
             class="text-[var(--cd-text-secondary)] hover:text-[var(--cd-text-primary)] no-underline text-sm py-1 {% block nav_settings_active %}{% endblock %}">
            Settings
          </a>
        </div>
      </div>
      <!-- Theme toggle -->
      <button onclick="__cdToggleTheme()"
              aria-label="Toggle dark/light mode"
              class="text-[var(--cd-text-secondary)] hover:text-[var(--cd-text-primary)] bg-transparent border border-[var(--cd-border)] rounded px-2 py-1 cursor-pointer text-sm">
        <span id="theme-icon">&#9790;</span>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast container for HX-Trigger notifications -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- HTMX -->
  <script src="/vendor/htmx.min.js"></script>

  <!-- Toast event listener -->
  <script>
    document.body.addEventListener('showToast', function(e) {
      var msg = e.detail && e.detail.message ? e.detail.message : 'Action completed';
      var level = e.detail && e.detail.level ? e.detail.level : 'info';
      var duration = e.detail && e.detail.duration !== undefined ? e.detail.duration : 3000;
      var container = document.getElementById('toast-container');
      var toast = document.createElement('div');
      toast.className = 'pointer-events-auto rounded font-mono';
      toast.style.padding = 'var(--cd-space-3) var(--cd-space-4)';
      toast.style.fontSize = 'var(--cd-text-sm)';
      toast.style.borderRadius = 'var(--cd-radius-md)';
      toast.style.display = 'flex';
      toast.style.alignItems = 'center';
      toast.style.gap = 'var(--cd-space-2)';
      toast.setAttribute('role', 'status');
      toast.setAttribute('aria-live', 'polite');
      if (level === 'error') {
        toast.style.background = 'var(--cd-status-error-bg)';
        toast.style.color = 'var(--cd-status-error)';
        toast.style.border = '1px solid var(--cd-status-error)';
      } else {
        toast.style.background = 'var(--cd-status-active-bg)';
        toast.style.color = 'var(--cd-status-active)';
        toast.style.border = '1px solid var(--cd-status-active)';
      }
      var msgSpan = document.createElement('span');
      msgSpan.style.flex = '1';
      msgSpan.textContent = msg;
      toast.appendChild(msgSpan);
      if (level === 'error' || duration === 0) {
        var closeBtn = document.createElement('button');
        closeBtn.textContent = '\u00d7';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.background = 'none';
        closeBtn.style.border = 'none';
        closeBtn.style.color = 'inherit';
        closeBtn.style.fontSize = '1.2em';
        closeBtn.style.lineHeight = '1';
        closeBtn.style.padding = '0';
        closeBtn.setAttribute('aria-label', 'Dismiss notification');
        closeBtn.onclick = function() { toast.remove(); };
        toast.appendChild(closeBtn);
      } else {
        var autoDismiss = duration > 0 ? duration : 3000;
        setTimeout(function() {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s ease';
          setTimeout(function() { toast.remove(); }, 300);
        }, autoDismiss);
      }
      container.appendChild(toast);
    });
  </script>
</body>
</html>
