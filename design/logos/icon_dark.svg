<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="#0a0d0b"/>
  <rect width="256" height="256" rx="40" fill="none" stroke="#1e2a22" stroke-width="2"/>
  <!-- Clock-arrow mark centered -->
  <g transform="translate(44, 56)">
    <!-- Clock circle -->
    <circle cx="56" cy="56" r="44" fill="none" stroke="#34d399" stroke-width="6"/>
    <!-- Hour hand (up) -->
    <line x1="56" y1="56" x2="56" y2="26" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
    <!-- Minute hand (right) -->
    <line x1="56" y1="56" x2="78" y2="56" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="56" cy="56" r="5" fill="#34d399"/>
    <!-- Pipeline -->
    <line x1="100" y1="56" x2="132" y2="56" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrow -->
    <polygon points="126,42 148,56 126,70" fill="#34d399"/>
  </g>
</svg>
