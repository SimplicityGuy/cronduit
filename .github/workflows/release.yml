# .github/workflows/release.yml
# Release pipeline triggered by semver tags (v*). Builds multi-arch Docker image
# via docker/build-push-action@v6 (NOT justfile -- the GHA provides native cache
# integration, platform matrix, and OCI label injection). Generates changelog from
# conventional commits via git-cliff and creates a GitHub Release.
#
# Security: This workflow only uses server-controlled inputs (GITHUB_REF for tag
# name, github.repository, github.actor, github.sha). No user-supplied text
# (issue titles, PR bodies, commit messages) flows into run: commands.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME is computed in the "Compute lowercase image name" step below.
  # ghcr.io (and the OCI spec) require all-lowercase repository names, but
  # ${{ github.repository }} preserves the original case of the GitHub owner
  # (e.g., "SimplicityGuy/cronduit"). The first v1.0.0 tag push failed with
  # `invalid tag "ghcr.io/SimplicityGuy/cronduit:1.0.0": repository name
  # must be lowercase` for exactly this reason. The step below derives a
  # lowercased value once and exports it into $GITHUB_ENV so every later
  # step sees the same ${{ env.IMAGE_NAME }} without re-running `tr`.

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-cliff

      - name: Compute lowercase image name
        # Derive IMAGE_NAME=<lowercase-owner>/<lowercase-repo> from the
        # $REPO env var and export to $GITHUB_ENV so later steps see it
        # via ${{ env.IMAGE_NAME }}. github.repository is a server-
        # controlled identifier (strict owner/repo format), but we route
        # it through an env var anyway to follow the project-wide "never
        # interpolate ${{ }} directly into run: commands" rule.
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "IMAGE_NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        # GITHUB_REF is a server-controlled value (refs/tags/v*) -- safe to use
        # directly. Only tag pushes trigger this workflow.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$(echo $TAG | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo $TAG | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (labels, tags, annotations)
        id: meta
        uses: docker/metadata-action@v5
        # DOCKER_METADATA_ANNOTATIONS_LEVELS controls which manifest levels
        # the action's `annotations` output targets. By default metadata-action
        # only emits `manifest`-level annotations (per-platform manifests),
        # which GHCR's multi-arch "Connected to repository" sidebar does NOT
        # read. Setting `index,manifest` tells it to emit both the top-level
        # index annotations AND the per-platform manifest annotations, which
        # build-push-action@v6 then routes via the `manifest:` and `index:`
        # prefixes in the `annotations` output.
        #
        # v1.0.0's initial release (tag 94e324e) shipped with this env var
        # UNSET, so annotations were silently dropped from both the index and
        # per-platform manifests -- only the image-config LABELs landed. The
        # LABELs are sufficient for GitHub's documented three-label recipe
        # (source/description/licenses), but annotations are the OCI-canonical
        # path and are required for some downstream tooling that inspects
        # manifests directly. See also:
        # https://github.com/docker/metadata-action/blob/master/README.md#annotations
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index,manifest
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag templates replace the hand-rolled multi-tag list below. The
          # type=semver entries derive semver-aware tags from the pushed git
          # tag (v1.0.0 -> 1.0.0, 1.0, 1). type=raw,value=latest keeps the
          # floating latest tag pointed at every release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          # Labels GitHub Container Registry recognizes for the package page:
          #   - org.opencontainers.image.source       (Connected to repository)
          #   - org.opencontainers.image.description  (package subtitle)
          #   - org.opencontainers.image.licenses     (sidebar license badge)
          # revision, version, created, url are auto-populated by
          # metadata-action from repo context. `source` is ALSO auto-populated,
          # but we emit it explicitly below as belt-and-suspenders: if auto-
          # population ever silently fails (image-name parsing quirk, version
          # drift), the explicit value still lands on the image. metadata-action
          # deduplicates by key, so there is no risk of two conflicting values.
          labels: |
            org.opencontainers.image.title=Cronduit
            org.opencontainers.image.description=Self-hosted Docker-native cron scheduler with a web UI
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=SimplicityGuy
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          # Annotations are written to the manifest INDEX and per-platform
          # manifests (not the image config). `DOCKER_METADATA_ANNOTATIONS_LEVELS`
          # above opts the metadata-action output into BOTH levels; without
          # that env var, annotations are silently scoped to manifest-only and
          # do not reach the top-level index. build-push-action@v6 then routes
          # each annotation line via the `manifest:` and `index:` prefixes
          # that metadata-action prepends in its output.
          annotations: |
            org.opencontainers.image.title=Cronduit
            org.opencontainers.image.description=Self-hosted Docker-native cron scheduler with a web UI
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=SimplicityGuy
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=cronduit-release
          cache-to: type=gha,mode=max,scope=cronduit-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
