# .github/workflows/release.yml
# Release pipeline triggered by semver tags (v*). Builds multi-arch Docker image
# via docker/build-push-action@v6 (NOT justfile -- the GHA provides native cache
# integration, platform matrix, and OCI label injection). Generates changelog from
# conventional commits via git-cliff and creates a GitHub Release.
#
# Security: This workflow only uses server-controlled inputs (GITHUB_REF for tag
# name, github.repository, github.actor, github.sha). No user-supplied text
# (issue titles, PR bodies, commit messages) flows into run: commands.

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME is computed in the "Compute lowercase image name" step below.
  # ghcr.io (and the OCI spec) require all-lowercase repository names, but
  # ${{ github.repository }} preserves the original case of the GitHub owner
  # (e.g., "SimplicityGuy/cronduit"). The first v1.0.0 tag push failed with
  # `invalid tag "ghcr.io/SimplicityGuy/cronduit:1.0.0": repository name
  # must be lowercase` for exactly this reason. The step below derives a
  # lowercased value once and exports it into $GITHUB_ENV so every later
  # step sees the same ${{ env.IMAGE_NAME }} without re-running `tr`.

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-cliff

      - name: Compute lowercase image name
        # Derive IMAGE_NAME=<lowercase-owner>/<lowercase-repo> from the
        # $REPO env var and export to $GITHUB_ENV so later steps see it
        # via ${{ env.IMAGE_NAME }}. github.repository is a server-
        # controlled identifier (strict owner/repo format), but we route
        # it through an env var anyway to follow the project-wide "never
        # interpolate ${{ }} directly into run: commands" rule.
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "IMAGE_NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        # GITHUB_REF is a server-controlled value (refs/tags/v*) -- safe to use
        # directly. Only tag pushes trigger this workflow.
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$(echo $TAG | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo $TAG | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.minor }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Self-hosted Docker-native cron scheduler with a web UI
            org.opencontainers.image.licenses=MIT OR Apache-2.0
          cache-from: type=gha,scope=cronduit-release
          cache-to: type=gha,mode=max,scope=cronduit-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
