# .github/workflows/cleanup-images.yml
# Monthly GHCR image pruning. Keeps the package page navigable on a long-lived
# OSS project that publishes on every main-branch push plus every tagged release.
#
# Source of inspiration (collapsed to a single flat job -- Cronduit ships ONE image):
#   https://github.com/SimplicityGuy/discogsography/blob/main/.github/workflows/cleanup-images.yml
#
# Retention policy is declared under the step inputs below: keep the two most recent
# tagged releases regardless of age, drop everything else older than thirty days, and
# sweep untagged orphan blobs plus partial image manifests.

name: Cleanup Docker Images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 15 * *"

concurrency:
  group: cleanup-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: prune ghcr.io/${{ github.repository_owner }}/cronduit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
      contents: read
    steps:
      - name: Cleanup Docker Images
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          delete-partial-images: true
          delete-untagged: true
          keep-n-tagged: 2
          older-than: 30 days
          token: ${{ secrets.GITHUB_TOKEN }}
          package: cronduit
          owner: ${{ github.repository_owner }}
